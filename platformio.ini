; =============================================================================
; PlatformIO Configuration — USB Keyboard Sniffer v2.2.3
; =============================================================================
;
; Build & Upload:
;   pio run                  # Build firmware
;   pio run -t upload        # Flash to connected RP2040
;   pio device monitor       # Open serial monitor (115200 baud)
;
; Pre-build:
;   python3 generate_build_seed.py   # Run ONCE before first build
;
; =============================================================================

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

; --- CPU clock: 120 MHz (required for stable PIO USB sniffing) ---
board_build.f_cpu = 120000000L

; --- Serial monitor at 115200 baud ---
monitor_speed = 115200

; --- Library dependencies ---
lib_deps =
    USBSnifferPIO_RP2040
    adafruit/Adafruit NeoPixel@^1.12.0

; --- Compiler flags ---
; -O2 for performance (PIO timing sensitive)
; -Wall for all warnings
build_flags =
    -O2
    -Wall
    -DPICO_FLASH_SIZE_BYTES=2097152
    -DPICO_DEFAULT_WDT_ENABLED=1

; --- Upload method ---
; Default: auto-detect (USB mass storage or picotool)
; For manual UF2: hold BOOTSEL, connect USB, copy .uf2 from .pio/build/pico/
upload_protocol = picotool

; --- Extra source files ---
; layout_registry.cpp is compiled automatically (in src/ or project root)
